<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrivo AI Chat</title>

<link rel="stylesheet" href="style.css">

<style>
.chat-box{
max-width:800px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.messages{
height:400px;
overflow-y:auto;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.input-row{
display:flex;
gap:10px;
}

.input-row input{
flex:1;
padding:12px;
font-size:16px;
}

.input-row button{
padding:12px 20px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<div class="container">
<img src="logo.svg" width="180" alt="Zentrivo">
</div>
</header>

<div class="chat-box">

<h1>🤖 Zentrivo AI Chat</h1>

<div id="messages" class="messages">
<p><strong>Zentrivo AI:</strong> Vítej! Brzy zde budeš moci chatovat s AI.</p>
</div>

<div class="input-row">
<input id="question" type="text" placeholder="Napiš svou otázku...">
<button>Odeslat</button>
</div>

</div>
<script src="script.js"></script><script src="script.js"></script>
</body>
</html>
